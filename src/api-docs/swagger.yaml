openapi: 3.1.0

# OAS 3.1 best-practice: declare the JSON Schema dialect explicitly so
# validators don't have to guess. OAS 3.1 is aligned with JSON Schema 2020-12.
jsonSchemaDialect: "https://spec.openapis.org/oas/3.1/dialect/base"

info:
    title: Sentinel BankServer API
    version: 1.0.0
    summary: Encrypted-at-the-application-layer banking API.
    description: |
        Reference documentation for the BankServer HTTP surface. Every operation
        is grouped under one of the 18 numbered flow tags so the call order is
        self-evident. Each operation also carries:

          * `description` — markdown including a bulleted **Prerequisites** list
            of operationIds that must run before this one.
          * `x-call-order` — an integer that orders operations *within* the flow
            tag. Tools that respect extension fields can sort by this.
          * `x-depends-on` — machine-readable mirror of the prerequisites list.
          * `x-decrypted-request` / `x-decrypted-response` — for encrypted ops,
            the JSON shape carried inside the inner envelope's `data` field
            (i.e. the operation's actual payload). The wire-level
            `requestBody` / `responses` schemas keep the literal wire envelope
            (`{ sessionId, payload }` in / `{ payload }` out); see
            **Cryptographic envelope** below for the inner envelope.

        ## Cryptographic envelope

        After the bootstrap handshake (flow `01-Bootstrap`), every encrypted
        endpoint uses **two nested envelopes**:

        **1. Wire envelope** — what travels over HTTP:

        ```json
        // Request
        { "sessionId": "<uuid>", "payload": "<base64 AES-256-GCM ciphertext>" }

        // Response
        { "payload": "<base64 AES-256-GCM ciphertext>" }
        ```

        `payload` is the AES-256-GCM ciphertext of the inner envelope below,
        with `sessionId` bound as Additional Authenticated Data (AAD).
        Schemas: [`EnvelopedRequest`](#/components/schemas/EnvelopedRequest)
        and [`EnvelopedResponse`](#/components/schemas/EnvelopedResponse).

        **2. Inner envelope** — what `payload` decrypts to:

        ```json
        { "data": <operation payload>, "nonce": "<32 hex chars>", "timestamp": <ms> }
        ```

        Canonical schema: [`DecryptedEnvelope`](#/components/schemas/DecryptedEnvelope).
        The fields:

          * `data` — the operation's actual JSON body. Its concrete shape is
            declared per-operation by the `x-decrypted-request` /
            `x-decrypted-response` extensions.
          * `nonce` — 16 random bytes hex-encoded. Per-session anti-replay;
            the server tracks recently seen nonces and rejects duplicates
            with `400 Replay detected`.
          * `timestamp` — client-clock ms since epoch. Rejected with
            `400 Stale request` if `|now - timestamp|` exceeds the freshness
            window (`TIMESTAMP_WINDOW_MS` = 60 000 ms / 1 minute).

        Errors come back through the same two-envelope pipeline — the inner
        `data` carries `{ success: false, error: { ... } }`
        ([`ApiErrorEnvelope`](#/components/schemas/ApiErrorEnvelope)).

        Clients must also send `x-session-id: <uuid>` on every encrypted
        request so the server can locate the AES key without parsing the body.

        **Plaintext exception** — `/security/session` and
        `/security/handshake` skip both envelopes (the AES key isn't
        established yet); their request and response bodies are plain JSON.

        ### Where to find the decrypted shape per operation

        The wire-level `requestBody` / `responses` schemas are deliberately
        the opaque outer envelope. The shape of the `data` field inside the
        decrypted inner envelope is documented in three places, in
        increasing fidelity:

          1. The per-operation `requestBody.description` and
             `responses[<2xx>].description` always name and link the schema,
             e.g. *"Decrypted envelope's `data` field conforms to
             `OtpRequestInput`."*
          2. The live Swagger UI viewer at `/api-docs/swagger-ui` renders a
             dedicated **Decrypted body** / **Decrypted response** schema
             explorer panel under the envelope (driven by `x-decrypted-*`).
             Each panel's subtitle reminds you the rendered shape is the
             `data` field, not the entire decrypted envelope.
          3. The Redoc viewers (`/api-docs/redoc`, `/api-docs/docs.html`)
             follow the description link straight to the schema under
             `#/components/schemas/<Name>` in the sidebar.

        ## Step-up (sensitive actions)

        Sensitive operations (transfers, opening accounts, freezing cards,
        revoking passkeys, ...) require a fresh WebAuthn assertion *bound to
        the specific action and parameters*. The flow is:

          1. `postWebauthnAuthenticationVerify` — returns `{ actionToken }`.
          3. The caller replays `x-action-token: <token>` on the sensitive
             endpoint within the TTL. The token is one-shot.

        Each step-up gated operation declares the action name in its
        description and adds the `ActionToken` security requirement.

        ## Common error shape

        All errors come back wrapped in the encrypted envelope (or plaintext
        for bootstrap routes) with body:

        ```json
        {
          "success": false,
          "error": { "message": "...", "requestId": "...", "details": { } }
        }
        ```

servers:
    - url: http://localhost:4000
      description: Direct connection to bankserver (development).
    - url: http://localhost:5174/api
      description: Same-origin via the Vite dev proxy used by bankwebui.
    - url: /
      description: Direct connection to bankserver (Backend Api).
    - url: /api
      description: Same-origin via the Vite proxy used by bankwebui.

security:
    - SessionId: []

tags:
    - name: 01-Bootstrap
      description: |
          ECDH P-256 + HKDF-SHA-256 handshake. Establishes the shared
          AES-256-GCM key without sending key material on the wire.

          **Call order:** `getSecuritySession` → `postSecurityHandshake`.
    - name: 02-Identity-Auth
      description: |
          Customer signup and 2-step login (password → passkey). On first
          login the passkey is *enrolled* via `/webauthn/registration/*`; on
          subsequent logins it is *asserted* via `/identity/login/passkey/*`.

          **Call order:** `postIdentitySignup` (one-time) → `postIdentityLoginPassword`
          → either `postWebauthnRegistrationOptions`+`postWebauthnRegistrationVerify`
          (first time) or `postIdentityLoginPasskeyOptions`+`postIdentityLoginPasskeyVerify`
          (returning) → `getIdentityMe`.
    - name: 03-StepUp
      description: |
          Mints a one-shot `actionToken` bound to a specific
          `(action, params, sessionId)` tuple. Required by every sensitive
          mutation in the rest of the API.

          **Call order:** `postWebauthnAuthenticationOptions` →
          `postWebauthnAuthenticationVerify` → consume `actionToken` on the
          protected endpoint.
    - name: 04-KYC-Customer
      description: |
          Type-first KYC submission. The customer picks an account type from
          `getAccountTypes`, then submits personal details via `postKyc`,
          then polls `getMyKyc` until an admin approves.
    - name: 05-KYC-Admin
      description: |
          Admin review queue. Approval emits `KycApproved`, which auto-opens
          an account of the requested type via the in-process event bus.
    - name: 06-Accounts-Customer
      description: |
          Listing the caller's accounts and opening additional ones (after
          KYC has been approved at least once). Type metadata picker too.
    - name: 07-Accounts-Admin
      description: |
          Admin operations on accounts: freeze / unfreeze status transitions
          and the dev faucet (deposit money without a counterparty).
    - name: 08-Beneficiaries
      description: |
          Saved payees per customer. Step-up gated for add/remove. Used as
          the "to" address by `postTransfer` and `postStandingInstruction`.
    - name: 09-Payments
      description: |
          Person-to-person transfers, recent ledger listing, and per-transfer
          receipt. `postTransfer` is the only step-up endpoint here.
    - name: 10-Bills
      description: |
          Biller registry + bill payments. A bill payment posts through the
          same ledger machinery as `postTransfer` with `category="bill"`.
    - name: 11-StandingInstructions
      description: |
          Recurring transfers (daily / weekly / monthly). The runner inside
          the server fires due rows every minute; each tick can emit a
          `StandingInstructionRan` event.
    - name: 12-Statements
      description: |
          Monthly account statements as JSON or CSV. The CSV endpoint wraps
          the text in a JSON envelope `{ filename, csv }` so the encryption
          middleware can apply uniformly.
    - name: 13-Cards
      description: |
          Cosmetic debit-card stubs (no PAN, no Luhn). Issue / freeze /
          unfreeze / cancel; each freeze emits `DebitCardFrozen`.
    - name: 14-Notifications
      description: |
          In-app notification inbox. Bus subscribers in `container.ts` emit
          these for KYC, transfers, standing-instruction runs, password
          changes, passkey revokes, and card freezes.
    - name: 15-Profile-Security
      description: |
          Self-service password change, passkey list / label / revoke, and
          "wipe other devices". Every mutating op is step-up gated.
    - name: 16-Admin-Users
      description: |
          Admin user management — list, lock / unlock, role change.
    - name: 17-Admin-Transactions
      description: Read-only listing of every transfer in the system.
    - name: 18-Admin-Audit
      description: |
          Append-only audit log of every mutating action, every auth event,
          and every privileged admin read. Each entry carries a hash chain
          so tampering is detectable via `verifyAdminAuditChain`.
    - name: 19-Dev
      description: |
          Test-only endpoints. Returns 403 when `NODE_ENV=production`. Used
          by integration tests that can't trigger a real WebAuthn gesture.

components:
    parameters:
        SessionIdHeader:
            name: x-session-id
            in: header
            required: true
            description: UUID of the encrypted session (must match `sessionId` in the body).
            schema:
                type: string
                format: uuid
        ActionTokenHeader:
            name: x-action-token
            in: header
            required: true
            description: One-shot step-up action token from `postWebauthnAuthenticationVerify`.
            schema:
                type: string
        OtpTokenHeader:
            name: x-otp-token
            in: header
            required: true
            description: |
                One-shot OTP token minted by `postIdentityOtpVerify`, bound
                to the same `(action, sessionId, paramsHash)` triple as the
                `x-action-token`. Required ALONGSIDE `x-action-token` on
                every OTP-gated route — the two factors are independent.
            schema:
                type: string

    securitySchemes:
        SessionId:
            type: apiKey
            in: header
            name: x-session-id
            description: |
                UUID identifying the encrypted session created by the bootstrap
                handshake. Required on every encrypted endpoint.
        ActionToken:
            type: apiKey
            in: header
            name: x-action-token
            description: |
                One-shot token minted by `postWebauthnAuthenticationVerify` and
                bound to a specific `(action, paramsHash, sessionId)` tuple.
                Required by every step-up gated operation.
        OtpToken:
            type: apiKey
            in: header
            name: x-otp-token
            description: |
                One-shot token minted by `postIdentityOtpVerify` and bound
                to a specific `(action, paramsHash, sessionId)` tuple.
                Required ALONGSIDE `ActionToken` by every OTP-gated route
                (passkey.add, passkey.revoke, password.change, session.wipe,
                admin.recovery).

    schemas:
        # ── Envelopes ──────────────────────────────────────────────────────────
        EnvelopedRequest:
            type: object
            required: [sessionId, payload]
            properties:
                sessionId:
                    type: string
                    format: uuid
                    description: Same UUID sent in the `x-session-id` header.
                payload:
                    type: string
                    description: |
                        Base64-encoded AES-256-GCM ciphertext (with
                        `sessionId` as AAD) of an inner
                        [`DecryptedEnvelope`](#/components/schemas/DecryptedEnvelope).
            description: |
                Generic wire shape of every encrypted POST body. After
                AES-GCM decryption, `payload` is a
                [`DecryptedEnvelope`](#/components/schemas/DecryptedEnvelope)
                — the operation's actual JSON sits in its `data` field, with
                shape declared per-operation by `x-decrypted-request`.

        EnvelopedResponse:
            type: object
            required: [payload]
            properties:
                payload:
                    type: string
                    description: |
                        Base64-encoded AES-256-GCM ciphertext (with
                        `sessionId` as AAD) of an inner
                        [`DecryptedEnvelope`](#/components/schemas/DecryptedEnvelope).
            description: |
                Generic wire shape of every encrypted success response. After
                AES-GCM decryption, `payload` is a
                [`DecryptedEnvelope`](#/components/schemas/DecryptedEnvelope)
                — the operation's actual JSON sits in its `data` field, with
                shape declared per-operation by `x-decrypted-response`.

        DecryptedEnvelope:
            type: object
            required: [data, nonce, timestamp]
            description: |
                Inner envelope wrapped around every operation's JSON body
                **before** AES-GCM encryption (and unwrapped after decryption
                on the receiving side). Used for both directions; the
                operation's actual shape lives in the `data` field, declared
                per-operation by the `x-decrypted-request` /
                `x-decrypted-response` extensions.

                `nonce` + `timestamp` are part of the wire contract every
                client must produce — they aren't internal server state. The
                server enforces both before the route handler sees `req.body`
                (see `decryptMiddleware`).
            properties:
                data:
                    description: |
                        Operation-specific JSON body. The exact shape is
                        declared per-operation by `x-decrypted-request` /
                        `x-decrypted-response`.
                nonce:
                    type: string
                    pattern: "^[0-9a-f]{32}$"
                    description: |
                        32 hex chars (16 random bytes). Must be unique per
                        `(sessionId, recent timestamp)`; the server tracks
                        recently seen nonces per session and rejects any
                        replay with `400 Replay detected`.
                timestamp:
                    type: integer
                    format: int64
                    description: |
                        Client-clock ms since the Unix epoch. Server rejects
                        requests whose `|now - timestamp|` exceeds the
                        freshness window (`TIMESTAMP_WINDOW_MS`, currently
                        60 000 ms / 1 minute) with `400 Stale request`.

        ApiError:
            type: object
            required: [message]
            properties:
                message:
                    type: string
                requestId:
                    type: string
                details:
                    type: object

        ApiErrorEnvelope:
            type: object
            description: |
                Decrypted error body. On encrypted routes this whole object
                rides inside the
                [`DecryptedEnvelope`](#/components/schemas/DecryptedEnvelope)'s
                `data` field (which is itself wrapped in
                `EnvelopedResponse.payload` on the wire). On plaintext
                bootstrap routes (`/security/*`) it comes back as the raw
                response body.
            required: [success, error]
            properties:
                success:
                    type: boolean
                    const: false
                error:
                    $ref: "#/components/schemas/ApiError"

        # ── Identity ───────────────────────────────────────────────────────────
        Role:
            type: string
            enum: [customer, admin]

        AccountStatus:
            type: string
            enum: [Active, Frozen, Closed, Locked]

        User:
            type: object
            required: [id, username, role]
            properties:
                id:
                    type: string
                    format: uuid
                username:
                    type: string
                role:
                    $ref: "#/components/schemas/Role"

        Credential:
            type: object
            required: [id, deviceType, backedUp, transports, createdAt]
            properties:
                id:
                    type: string
                label:
                    type: ["string", "null"]
                deviceType:
                    type: string
                    enum: [singleDevice, multiDevice]
                backedUp:
                    type: boolean
                transports:
                    type: array
                    items:
                        type: string
                createdAt:
                    type: string
                    format: date-time
                lastUsedAt:
                    type: ["string", "null"]
                    format: date-time

        SessionInfo:
            type: object
            required: [sessionId, isCurrent, createdAt, lastUsedAt]
            properties:
                sessionId:
                    type: string
                    format: uuid
                isCurrent:
                    type: boolean
                createdAt:
                    type: string
                    format: date-time
                lastUsedAt:
                    type: string
                    format: date-time

        SignupInput:
            type: object
            required: [username, email, password]
            properties:
                username:
                    type: string
                    minLength: 3
                    maxLength: 32
                email:
                    type: string
                    format: email
                password:
                    type: string
                    description: Min 10 chars; must contain upper, lower, digit, and symbol.

        SignupOutput:
            type: object
            required: [userId, username, role]
            properties:
                userId:
                    type: string
                    format: uuid
                username:
                    type: string
                role:
                    $ref: "#/components/schemas/Role"

        LoginPasswordInput:
            type: object
            required: [username, password, sessionId]
            properties:
                username:
                    type: string
                password:
                    type: string
                sessionId:
                    type: string
                    format: uuid

        LoginPasswordOutput:
            type: object
            required: [nextStep, username, nonce, expiresAt]
            properties:
                nextStep:
                    type: string
                    enum: [enroll, auth]
                    description: |
                        `enroll` for first-time users (run the WebAuthn registration
                        flow next); `auth` for returning users (run the
                        authentication flow next).
                username:
                    type: string
                nonce:
                    type: string
                    description: Echo back as `nonce` on the next step.
                expiresAt:
                    type: integer
                    format: int64

        LoginRecoveryInput:
            type: object
            required: [username, password, code, sessionId]
            properties:
                username:
                    type: string
                password:
                    type: string
                code:
                    type: string
                    description: Single-use recovery code, 12 chars dash-separated (e.g. `ABCD-EFGH-JKLM`).
                sessionId:
                    type: string
                    format: uuid

        LoginRecoveryOutput:
            type: object
            required: [nextStep, username, nonce, expiresAt]
            properties:
                nextStep:
                    type: string
                    const: "enroll-additional"
                    description: Always `enroll-additional`. Client runs `/webauthn/registration/options` next.
                username:
                    type: string
                nonce:
                    type: string
                expiresAt:
                    type: integer
                    format: int64

        EnrollOptionsOutput:
            type: object
            required: [nonce, expiresAt]
            properties:
                nonce:
                    type: string
                expiresAt:
                    type: integer
                    format: int64

        OtpRequestInput:
            type: object
            required: [action]
            properties:
                action:
                    type: string
                    description: |
                        OTP-required action name. Must be one of
                        `passkey.add`, `passkey.revoke`, `password.change`,
                        `session.wipe`, `admin.recovery`.
                params:
                    description: |
                        Action-specific parameters that will be hashed and
                        bound to the minted OTP token. Must match the body
                        of the eventual sensitive request EXACTLY.

        OtpRequestOutput:
            type: object
            required: [requestId, expiresAt, deliveredVia]
            properties:
                requestId:
                    type: string
                    format: uuid
                expiresAt:
                    type: integer
                    format: int64
                cooldownUntil:
                    type: integer
                    format: int64
                    description: Earliest timestamp at which a fresh code may be requested for the same action+params.
                deliveredVia:
                    type: string
                    description: |
                        Provider id. `stub` in dev (code is in server logs);
                        `smtp`/`ses`/etc. in production.
                resent:
                    type: boolean

        OtpVerifyInput:
            type: object
            required: [action, code]
            properties:
                action:
                    type: string
                params:
                    description: Same shape as `OtpRequestInput.params`.
                code:
                    type: string
                    description: 6-digit code from the delivery channel (or `000000` if `OTP_STUB_BYPASS=true`).

        OtpVerifyOutput:
            type: object
            required: [otpToken, expiresAt]
            properties:
                otpToken:
                    type: string
                    description: |
                        Single-use, action-bound bearer token. Send as
                        `x-otp-token` header on the sensitive endpoint.
                expiresAt:
                    type: integer
                    format: int64

        AdminRecoveryCodeOutput:
            type: object
            required: [code, expiresAt, purpose, userId, username]
            properties:
                code:
                    type: string
                    description: |
                        Plaintext recovery code. Returned **once** — admin must copy
                        and deliver to the user out-of-band, never persisted server-side.
                expiresAt:
                    type: string
                    format: date-time
                purpose:
                    type: string
                    const: "passkey-add"
                userId:
                    type: string
                    format: uuid
                username:
                    type: string

        PasskeyOptionsInput:
            type: object
            required: [sessionId, nonce]
            properties:
                sessionId:
                    type: string
                    format: uuid
                nonce:
                    type: string

        PasskeyVerifyInput:
            type: object
            required: [sessionId, nonce, response]
            properties:
                sessionId:
                    type: string
                    format: uuid
                nonce:
                    type: string
                response:
                    type: object
                    description: Raw `AuthenticationResponseJSON` / `RegistrationResponseJSON` from `@simplewebauthn/browser`.

        PasskeyVerifyResult:
            type: object
            required: [verified, user]
            properties:
                verified:
                    type: boolean
                user:
                    $ref: "#/components/schemas/User"

        AuthenticationOptionsInput:
            type: object
            required: [username, sessionId, action]
            properties:
                username:
                    type: string
                sessionId:
                    type: string
                    format: uuid
                action:
                    type: string
                    description: |
                        Logical name of the action being approved, e.g. `transfer`,
                        `bill.pay`, `card.issue`, `password.change`.
                params:
                    description: Action-specific parameters (hashed server-side as `paramsHash`).

        AuthenticationOptionsOutput:
            type: object
            required: [options, paramsHash]
            properties:
                options:
                    type: object
                    description: WebAuthn `PublicKeyCredentialRequestOptionsJSON`.
                paramsHash:
                    type: string

        AuthenticationVerifyInput:
            type: object
            required: [username, response]
            properties:
                username:
                    type: string
                response:
                    type: object
                    description: Raw `AuthenticationResponseJSON`.

        AuthenticationVerifyResult:
            type: object
            required: [verified, actionToken, expiresAt]
            properties:
                verified:
                    type: boolean
                actionToken:
                    type: string
                expiresAt:
                    type: integer
                    format: int64

        ChangePasswordInput:
            type: object
            required: [oldPassword, newPassword]
            properties:
                oldPassword:
                    type: string
                newPassword:
                    type: string

        LabelCredentialInput:
            type: object
            required: [label]
            properties:
                label:
                    type: string
                    maxLength: 64

        WipeOthersResult:
            type: object
            required: [success, wiped]
            properties:
                success:
                    type: boolean
                    const: true
                wiped:
                    type: integer
                    minimum: 0

        # ── Accounts ───────────────────────────────────────────────────────────
        AccountType:
            type: string
            enum: [savings, current, fixed_deposit]

        AccountTypeMeta:
            type: object
            required: [type, label, description]
            properties:
                type:
                    $ref: "#/components/schemas/AccountType"
                label:
                    type: string
                description:
                    type: string

        Account:
            type: object
            required:
                - id
                - accountNumber
                - userId
                - accountType
                - status
                - balanceMinor
                - currency
                - createdAt
                - updatedAt
            properties:
                id:
                    type: string
                    format: uuid
                accountNumber:
                    type: string
                    examples:
                        - "SBE-0000000001"
                userId:
                    type: string
                    format: uuid
                accountType:
                    $ref: "#/components/schemas/AccountType"
                status:
                    type: string
                    enum: [Active, Frozen, Closed]
                balanceMinor:
                    type: integer
                    description: Balance in minor currency units (paise for INR).
                currency:
                    type: string
                    const: "INR"
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        OpenAccountInput:
            type: object
            required: [accountType]
            properties:
                accountType:
                    $ref: "#/components/schemas/AccountType"

        FaucetInput:
            type: object
            required: [toAccountId, amountMinor]
            properties:
                toAccountId:
                    type: string
                    format: uuid
                amountMinor:
                    type: integer
                    minimum: 1
                memo:
                    type: string
                    maxLength: 256
                idempotencyKey:
                    type: string
                    maxLength: 128

        # ── KYC ────────────────────────────────────────────────────────────────
        KycStatus:
            type: string
            enum: [Submitted, Approved, Rejected]

        KycApplication:
            type: object
            required:
                - id
                - userId
                - fullName
                - dob
                - pan
                - address
                - requestedAccountType
                - status
                - submittedAt
            properties:
                id:
                    type: string
                    format: uuid
                userId:
                    type: string
                    format: uuid
                fullName:
                    type: string
                dob:
                    type: string
                    format: date
                pan:
                    type: string
                    examples:
                        - "ABCDE1234F"
                address:
                    type: string
                requestedAccountType:
                    $ref: "#/components/schemas/AccountType"
                status:
                    $ref: "#/components/schemas/KycStatus"
                submittedAt:
                    type: string
                    format: date-time
                decidedAt:
                    type: string
                    format: date-time
                rejectReason:
                    type: string

        SubmitKycInput:
            type: object
            required: [fullName, dob, pan, address]
            properties:
                fullName:
                    type: string
                    maxLength: 128
                dob:
                    type: string
                    format: date
                pan:
                    type: string
                    maxLength: 10
                address:
                    type: string
                    maxLength: 256
                docB64:
                    type: string
                    description: Optional ID-document blob, base64 (≤ 32 KiB).
                requestedAccountType:
                    $ref: "#/components/schemas/AccountType"

        RejectKycInput:
            type: object
            required: [reason]
            properties:
                reason:
                    type: string
                    maxLength: 256

        # ── Beneficiaries ──────────────────────────────────────────────────────
        Beneficiary:
            type: object
            required: [id, nickname, accountNumber, createdAt]
            properties:
                id:
                    type: string
                    format: uuid
                nickname:
                    type: string
                accountNumber:
                    type: string
                beneficiaryUsername:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                lastUsedAt:
                    type: string
                    format: date-time

        AddBeneficiaryInput:
            type: object
            required: [nickname, accountNumber]
            properties:
                nickname:
                    type: string
                    maxLength: 64
                accountNumber:
                    type: string
                    examples:
                        - "SBE-0000000001"

        # ── Payments ───────────────────────────────────────────────────────────
        TransferKind:
            type: string
            enum: [transfer, faucet]

        TransferCategory:
            type: string
            enum: [p2p, self, faucet, bill]

        Transfer:
            type: object
            required:
                - id
                - amountMinor
                - currency
                - kind
                - status
                - postedAt
                - category
            properties:
                id:
                    type: string
                    format: uuid
                idempotencyKey:
                    type: string
                fromAccountId:
                    type: string
                    format: uuid
                toAccountId:
                    type: string
                    format: uuid
                amountMinor:
                    type: integer
                currency:
                    type: string
                    const: "INR"
                memo:
                    type: string
                kind:
                    $ref: "#/components/schemas/TransferKind"
                status:
                    type: string
                    const: "posted"
                postedAt:
                    type: string
                    format: date-time
                referenceNumber:
                    type: string
                    examples:
                        - "TXN-A1B2-C3D4"
                feeMinor:
                    type: integer
                category:
                    $ref: "#/components/schemas/TransferCategory"
                fromAccountNumber:
                    type: string
                toAccountNumber:
                    type: string
                fromUsername:
                    type: string
                toUsername:
                    type: string
                description:
                    type: string
                billerId:
                    type: string
                    format: uuid

        LedgerEntry:
            type: object
            required:
                - id
                - accountId
                - transferId
                - kind
                - amountMinor
                - runningBalanceMinor
                - postedAt
            properties:
                id:
                    type: string
                    format: uuid
                accountId:
                    type: string
                    format: uuid
                transferId:
                    type: string
                    format: uuid
                kind:
                    type: string
                    enum: [debit, credit]
                amountMinor:
                    type: integer
                runningBalanceMinor:
                    type: integer
                postedAt:
                    type: string
                    format: date-time

        ExecuteTransferInput:
            type: object
            required: [fromAccountId, amountMinor]
            description: |
                Provide either `toAccountNumber` (free-text) or `beneficiaryId`
                (resolves to a saved beneficiary's account number).
            properties:
                fromAccountId:
                    type: string
                    format: uuid
                toAccountNumber:
                    type: string
                beneficiaryId:
                    type: string
                    format: uuid
                amountMinor:
                    type: integer
                    minimum: 1
                memo:
                    type: string
                    maxLength: 256
                idempotencyKey:
                    type: string
                    maxLength: 128

        # ── Bills ──────────────────────────────────────────────────────────────
        BillerCategory:
            type: string
            enum: [electricity, gas, water, internet, mobile, other]

        Biller:
            type: object
            required: [id, name, category, billerAccountNumber, active]
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                category:
                    $ref: "#/components/schemas/BillerCategory"
                billerAccountNumber:
                    type: string
                active:
                    type: boolean

        PayBillInput:
            type: object
            required: [fromAccountId, billerId, amountMinor]
            properties:
                fromAccountId:
                    type: string
                    format: uuid
                billerId:
                    type: string
                    format: uuid
                amountMinor:
                    type: integer
                    minimum: 1
                customerRef:
                    type: string
                    maxLength: 64
                idempotencyKey:
                    type: string
                    maxLength: 128

        BillPaymentResult:
            type: object
            required: [id, amountMinor]
            properties:
                id:
                    type: string
                    format: uuid
                referenceNumber:
                    type: string
                amountMinor:
                    type: integer
                billerId:
                    type: string
                    format: uuid

        # ── Standing Instructions ──────────────────────────────────────────────
        SiFrequency:
            type: string
            enum: [daily, weekly, monthly]

        SiStatus:
            type: string
            enum: [active, paused, cancelled]

        StandingInstruction:
            type: object
            required:
                - id
                - fromAccountId
                - beneficiaryId
                - amountMinor
                - currency
                - frequency
                - nextRunAt
                - status
                - createdAt
            properties:
                id:
                    type: string
                    format: uuid
                fromAccountId:
                    type: string
                    format: uuid
                beneficiaryId:
                    type: string
                    format: uuid
                amountMinor:
                    type: integer
                currency:
                    type: string
                    const: "INR"
                frequency:
                    $ref: "#/components/schemas/SiFrequency"
                nextRunAt:
                    type: string
                    format: date-time
                lastRunAt:
                    type: string
                    format: date-time
                status:
                    $ref: "#/components/schemas/SiStatus"
                description:
                    type: string
                createdAt:
                    type: string
                    format: date-time

        CreateSiInput:
            type: object
            required: [fromAccountId, beneficiaryId, amountMinor, frequency]
            properties:
                fromAccountId:
                    type: string
                    format: uuid
                beneficiaryId:
                    type: string
                    format: uuid
                amountMinor:
                    type: integer
                    minimum: 1
                frequency:
                    $ref: "#/components/schemas/SiFrequency"
                description:
                    type: string
                    maxLength: 256

        # ── Statements ─────────────────────────────────────────────────────────
        StatementLine:
            type: object
            required:
                - postedAt
                - transferId
                - direction
                - amountMinor
                - runningBalanceMinor
                - kind
            properties:
                postedAt:
                    type: string
                    format: date-time
                transferId:
                    type: string
                    format: uuid
                direction:
                    type: string
                    enum: [debit, credit]
                amountMinor:
                    type: integer
                runningBalanceMinor:
                    type: integer
                counterpartyAccountId:
                    type: string
                    format: uuid
                counterpartyName:
                    type: string
                referenceNumber:
                    type: string
                memo:
                    type: string
                description:
                    type: string
                kind:
                    type: string
                    enum: [transfer, faucet]

        Statement:
            type: object
            required:
                - accountId
                - month
                - openingBalanceMinor
                - closingBalanceMinor
                - totalDebitMinor
                - totalCreditMinor
                - lines
            properties:
                accountId:
                    type: string
                    format: uuid
                month:
                    type: string
                    pattern: "^\\d{4}-(0[1-9]|1[0-2])$"
                openingBalanceMinor:
                    type: integer
                closingBalanceMinor:
                    type: integer
                totalDebitMinor:
                    type: integer
                totalCreditMinor:
                    type: integer
                lines:
                    type: array
                    items:
                        $ref: "#/components/schemas/StatementLine"

        StatementCsvBundle:
            type: object
            required: [filename, csv]
            properties:
                filename:
                    type: string
                    examples:
                        - "statement-SBE-0000000001-2026-05.csv"
                csv:
                    type: string
                    description: Raw CSV text.

        # ── Cards ──────────────────────────────────────────────────────────────
        CardNetwork:
            type: string
            enum: [visa, mastercard, rupay]

        CardStatus:
            type: string
            enum: [active, frozen, cancelled]

        DebitCard:
            type: object
            required: [id, accountId, maskedNumber, network, status, issuedAt]
            properties:
                id:
                    type: string
                    format: uuid
                accountId:
                    type: string
                    format: uuid
                accountNumber:
                    type: string
                maskedNumber:
                    type: string
                    examples:
                        - "4242-XXXX-XXXX-1234"
                network:
                    $ref: "#/components/schemas/CardNetwork"
                status:
                    $ref: "#/components/schemas/CardStatus"
                issuedAt:
                    type: string
                    format: date-time
                frozenAt:
                    type: string
                    format: date-time
                cancelledAt:
                    type: string
                    format: date-time

        IssueCardInput:
            type: object
            required: [accountId]
            properties:
                accountId:
                    type: string
                    format: uuid
                network:
                    $ref: "#/components/schemas/CardNetwork"

        # ── Notifications ──────────────────────────────────────────────────────
        NotificationKind:
            type: string
            enum:
                - kyc.approved
                - kyc.rejected
                - transfer.sent
                - transfer.received
                - standing.executed
                - password.changed
                - passkey.revoked
                - card.frozen
                - card.issued

        Notification:
            type: object
            required: [id, kind, title, body, createdAt]
            properties:
                id:
                    type: string
                    format: uuid
                kind:
                    $ref: "#/components/schemas/NotificationKind"
                title:
                    type: string
                body:
                    type: string
                readAt:
                    type: string
                    format: date-time
                relatedEntityType:
                    type: string
                relatedEntityId:
                    type: string
                createdAt:
                    type: string
                    format: date-time

        NotificationPage:
            type: object
            required: [notifications, unreadCount]
            properties:
                notifications:
                    type: array
                    items:
                        $ref: "#/components/schemas/Notification"
                unreadCount:
                    type: integer
                    minimum: 0

        # ── Admin ──────────────────────────────────────────────────────────────
        AdminUser:
            type: object
            required:
                - id
                - username
                - email
                - role
                - accountStatus
                - passkeyEnrolled
                - failedAttempts
                - createdAt
            properties:
                id:
                    type: string
                    format: uuid
                username:
                    type: string
                email:
                    type: string
                role:
                    $ref: "#/components/schemas/Role"
                accountStatus:
                    $ref: "#/components/schemas/AccountStatus"
                passkeyEnrolled:
                    type: boolean
                failedAttempts:
                    type: integer
                lockedUntil:
                    type: ["string", "null"]
                    format: date-time
                createdAt:
                    type: string
                    format: date-time

        SetRoleInput:
            type: object
            required: [role]
            properties:
                role:
                    $ref: "#/components/schemas/Role"

        OkResult:
            type: object
            required: [ok]
            properties:
                ok:
                    type: boolean
                    const: true

        SuccessResult:
            type: object
            required: [success]
            properties:
                success:
                    type: boolean
                    const: true

        # ── Audit ──────────────────────────────────────────────────────────────
        AuditEntry:
            type: object
            required:
                - id
                - seq
                - occurredAt
                - actorRole
                - action
                - category
                - status
                - summary
                - hash
            properties:
                id:
                    type: string
                    format: uuid
                seq:
                    type: integer
                    description: Monotonic sequence.
                occurredAt:
                    type: string
                    format: date-time
                actorUserId:
                    type: ["string", "null"]
                actorUsername:
                    type: ["string", "null"]
                actorRole:
                    type: string
                    enum: [customer, admin, system, anonymous]
                sessionId:
                    type: ["string", "null"]
                action:
                    type: string
                category:
                    type: string
                    enum:
                        - auth
                        - money
                        - kyc
                        - account
                        - beneficiary
                        - bill
                        - si
                        - card
                        - admin.read
                        - admin.write
                        - system
                targetType:
                    type: ["string", "null"]
                targetId:
                    type: ["string", "null"]
                status:
                    type: string
                    enum: [success, failure]
                errorCode:
                    type: ["string", "null"]
                summary:
                    type: string
                payload:
                    type: ["object", "null"]
                requestId:
                    type: ["string", "null"]
                ip:
                    type: ["string", "null"]
                userAgent:
                    type: ["string", "null"]
                prevHash:
                    type: ["string", "null"]
                hash:
                    type: string

        # ── Bootstrap (plaintext) ──────────────────────────────────────────────
        SecuritySessionResponse:
            type: object
            required: [sessionId, serverPublicJwk, salt]
            properties:
                sessionId:
                    type: string
                    format: uuid
                serverPublicJwk:
                    type: object
                salt:
                    type: string

        SecurityHandshakeRequest:
            type: object
            required: [sessionId, clientPublicJwk]
            properties:
                sessionId:
                    type: string
                    format: uuid
                clientPublicJwk:
                    type: object

        # ── Dev ────────────────────────────────────────────────────────────────
        DevLoginAsInput:
            type: object
            required: [username, sessionId]
            properties:
                username:
                    type: string
                sessionId:
                    type: string
                    format: uuid
                role:
                    $ref: "#/components/schemas/Role"
                password:
                    type: string

        DevResetPasswordInput:
            type: object
            required: [username, password]
            properties:
                username:
                    type: string
                password:
                    type: string

paths:
    # =========================================================================
    # 01-Bootstrap
    # =========================================================================
    /security/session:
        get:
            operationId: getSecuritySession
            tags: [01-Bootstrap]
            summary: Allocate a session and return the server's ECDH public key.
            description: |
                First step of the encryption handshake. Plaintext.
                **Prerequisites:** none.
            security: []
            x-call-order: 1
            x-depends-on: []
            responses:
                "200":
                    description: New session allocated.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SecuritySessionResponse"
                "4XX":
                    description: Validation error.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ApiErrorEnvelope"

    /security/handshake:
        post:
            operationId: postSecurityHandshake
            tags: [01-Bootstrap]
            summary: Complete the ECDH handshake by submitting the client public key.
            description: |
                Derives the AES session key. Following endpoints are encrypted.
                **Prerequisites:** `getSecuritySession`.
            security: []
            x-call-order: 2
            x-depends-on: [getSecuritySession]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SecurityHandshakeRequest"
            responses:
                "200":
                    description: Key live on both sides.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SuccessResult"
                "4XX":
                    description: Handshake error.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ApiErrorEnvelope"

    # =========================================================================
    # 02-Identity-Auth
    # =========================================================================
    /identity/signup:
        post:
            operationId: postIdentitySignup
            tags: [02-Identity-Auth]
            summary: Create a customer account (username + email + password).
            description: |
                One-time call per user. Returns the new userId.
                **Prerequisites:** `postSecurityHandshake`.
            x-call-order: 1
            x-depends-on: [postSecurityHandshake]
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
            requestBody:
                x-decrypted-request:
                    $ref: "#/components/schemas/SignupInput"
                description: |
                    Encrypted envelope (`EnvelopedRequest`). Plaintext is a `DecryptedEnvelope` whose `data` field conforms to `SignupInput`.
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "201":
                    x-decrypted-response:
                        $ref: "#/components/schemas/SignupOutput"
                    description: |
                        User created.

                        Decrypted body is a `DecryptedEnvelope` whose `data` field conforms to `SignupOutput`.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"
                "4XX":
                    description: Username taken / validation failure.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /identity/login/password:
        post:
            operationId: postIdentityLoginPassword
            tags: [02-Identity-Auth]
            summary: Step 1 of login — verify the password and return the next step.
            description: |
                Returns next steps (`enroll` or `auth`). Must echo back the nonce.
                **Prerequisites:** `postSecurityHandshake`, `postIdentitySignup`.
            x-call-order: 2
            x-depends-on: [postSecurityHandshake, postIdentitySignup]
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
            requestBody:
                x-decrypted-request:
                    $ref: "#/components/schemas/LoginPasswordInput"
                description: |
                    Encrypted envelope (`EnvelopedRequest`). Plaintext is a `DecryptedEnvelope` whose `data` field conforms to `LoginPasswordInput`.
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "200":
                    x-decrypted-response:
                        $ref: "#/components/schemas/LoginPasswordOutput"
                    description: |
                        Password verified.

                        Decrypted body is a `DecryptedEnvelope` whose `data` field conforms to `LoginPasswordOutput`.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"
                "4XX":
                    description: Bad credentials or session mismatch.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /identity/otp/request:
        post:
            operationId: postIdentityOtpRequest
            tags: [02-Identity-Auth]
            summary: Mint and deliver a 6-digit email OTP for an OTP-gated action.
            description: |
                Generates a code with a 5-minute TTL. Delivered out-of-band.
                **Prerequisites:** Authenticated session.
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
            requestBody:
                x-decrypted-request:
                    $ref: "#/components/schemas/OtpRequestInput"
                description: |
                    Encrypted envelope (`EnvelopedRequest`). Plaintext is a `DecryptedEnvelope` whose `data` field conforms to `OtpRequestInput`.
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "200":
                    x-decrypted-response:
                        $ref: "#/components/schemas/OtpRequestOutput"
                    description: |
                        Code generated.

                        Decrypted body is a `DecryptedEnvelope` whose `data` field conforms to `OtpRequestOutput`.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"
                "4XX":
                    description: Action not gated or invalid input.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /identity/otp/verify:
        post:
            operationId: postIdentityOtpVerify
            tags: [02-Identity-Auth]
            summary: Verify a delivered OTP and mint an action-bound `otpToken`.
            description: |
                Returns a single-use token to match with `x-otp-token`.
                **Prerequisites:** `postIdentityOtpRequest`.
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
            requestBody:
                x-decrypted-request:
                    $ref: "#/components/schemas/OtpVerifyInput"
                description: |
                    Encrypted envelope (`EnvelopedRequest`). Plaintext is a `DecryptedEnvelope` whose `data` field conforms to `OtpVerifyInput`.
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "200":
                    x-decrypted-response:
                        $ref: "#/components/schemas/OtpVerifyOutput"
                    description: |
                        OTP token minted.

                        Decrypted body is a `DecryptedEnvelope` whose `data` field conforms to `OtpVerifyOutput`.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"
                "4XX":
                    description: Invalid or expired code.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /identity/login/recovery:
        post:
            operationId: postIdentityLoginRecovery
            tags: [02-Identity-Auth]
            summary: Bootstrap an additional passkey on a new device using a one-shot recovery code.
            description: |
                For users resetting verification credentials via admin loops.
                **Prerequisites:** `postSecurityHandshake`, admin-issued code.
            x-call-order: 2
            x-depends-on: [postSecurityHandshake]
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
            requestBody:
                x-decrypted-request:
                    $ref: "#/components/schemas/LoginRecoveryInput"
                description: |
                    Encrypted envelope (`EnvelopedRequest`). Plaintext is a `DecryptedEnvelope` whose `data` field conforms to `LoginRecoveryInput`.
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "200":
                    x-decrypted-response:
                        $ref: "#/components/schemas/LoginRecoveryOutput"
                    description: |
                        Code verified.

                        Decrypted body is a `DecryptedEnvelope` whose `data` field conforms to `LoginRecoveryOutput`.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"
                "4XX":
                    description: Invalid code or bad baseline credentials.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /identity/credentials/enroll-options:
        post:
            operationId: postIdentityCredentialsEnrollOptions
            tags: [02-Identity-Auth]
            summary: Mint an enroll-additional state for the current authenticated user.
            description: |
                Settings-side profile orchestration logic step.
                **Prerequisites:** Logged in context, step-up requirements satisfied.
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
                - $ref: "#/components/parameters/OtpTokenHeader"
                - in: header
                  name: x-action-token
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "200":
                    x-decrypted-response:
                        $ref: "#/components/schemas/EnrollOptionsOutput"
                    description: |
                        Nonce returned.

                        Decrypted body is a `DecryptedEnvelope` whose `data` field conforms to `EnrollOptionsOutput`.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /webauthn/registration/options:
        post:
            operationId: postWebauthnRegistrationOptions
            tags: [02-Identity-Auth]
            summary: First-time passkey enrollment — fetch creation options.
            description: |
                Fetches parameter structures for `navigator.credentials.create`.
                **Prerequisites:** `postIdentityLoginPassword` context.
            x-call-order: 3
            x-depends-on: [postIdentityLoginPassword]
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
            requestBody:
                x-decrypted-request:
                    $ref: "#/components/schemas/PasskeyOptionsInput"
                description: |
                    Encrypted envelope (`EnvelopedRequest`). Plaintext is a `DecryptedEnvelope` whose `data` field conforms to `PasskeyOptionsInput`.
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "200":
                    description: WebAuthn creation options.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /webauthn/registration/verify:
        post:
            operationId: postWebauthnRegistrationVerify
            tags: [02-Identity-Auth]
            summary: First-time passkey enrollment — verify the attestation.
            description: |
                Persists credentials, sets state parameters flag.
                **Prerequisites:** `postWebauthnRegistrationOptions`.
            x-call-order: 4
            x-depends-on: [postWebauthnRegistrationOptions]
            parameters:
                - $ref: "#/components/parameters/SessionIdHeader"
            requestBody:
                x-decrypted-request:
                    $ref: "#/components/schemas/PasskeyVerifyInput"
                description: |
                    Encrypted envelope (`EnvelopedRequest`). Plaintext is a `DecryptedEnvelope` whose `data` field conforms to `PasskeyVerifyInput`.
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/EnvelopedRequest"
            responses:
                "200":
                    x-decrypted-response:
                        $ref: "#/components/schemas/PasskeyVerifyResult"
                    description: |
                        Credential registered.

                        Decrypted body is a `DecryptedEnvelope` whose `data` field conforms to `PasskeyVerifyResult`.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnvelopedResponse"

    /identity/login/passkey/options:
        post:
            operationId: postIdentityLoginPasskeyOptions
            tags: [02-Identity-Auth]
            summary: Returning user — fetch passkey assertion options.
