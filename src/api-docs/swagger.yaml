paths:
  /security/session:
    get:
      operationId: |-
        getSecuritySession
      tags:
        - |-
          01-Bootstrap
      summary: |-
        Allocate a session and return the server's ECDH public key.
      description: |-
        First step of the encryption handshake. Plaintext.
        **Prerequisites:** none.
      security: []
      x-call-order: 1
      x-depends-on: []
      responses:
        "200":
          description: |-
            New session allocated.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/SecuritySessionResponse
        4XX:
          description: |-
            Validation error.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/ApiErrorEnvelope
  /security/handshake:
    post:
      operationId: |-
        postSecurityHandshake
      tags:
        - |-
          01-Bootstrap
      summary: |-
        Complete the ECDH handshake by submitting the client public key.
      description: |-
        Derives the AES session key. Following endpoints are encrypted.
        **Prerequisites:** `getSecuritySession`.
      security: []
      x-call-order: 2
      x-depends-on:
        - |-
          getSecuritySession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/SecurityHandshakeRequest
      responses:
        "200":
          description: |-
            Key live on both sides.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/SuccessResult
        4XX:
          description: |-
            Handshake error.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/ApiErrorEnvelope
  /identity/signup:
    post:
      operationId: |-
        postIdentitySignup
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Create a customer account (username + email + password).
      description: |-
        One-time call per user. Returns the new userId.
        **Prerequisites:** `postSecurityHandshake`.
      x-call-order: 1
      x-depends-on:
        - |-
          postSecurityHandshake
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/SignupInput
      responses:
        "201":
          description: |-
            User created.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/SignupOutput
        4XX:
          description: |-
            Username taken / validation failure.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/ApiErrorEnvelope
  /identity/login/password:
    post:
      operationId: |-
        postIdentityLoginPassword
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Step 1 of login — verify the password and return the next step.
      description: |-
        Returns next steps (`enroll` or `auth`). Must echo back the nonce.
        **Prerequisites:** `postSecurityHandshake`, `postIdentitySignup`.
      x-call-order: 2
      x-depends-on:
        - |-
          postSecurityHandshake
        - |-
          postIdentitySignup
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/LoginPasswordInput
      responses:
        "200":
          description: |-
            Password verified.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/LoginPasswordOutput
        4XX:
          description: |-
            Bad credentials or session mismatch.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/ApiErrorEnvelope
  /identity/otp/request:
    post:
      operationId: |-
        postIdentityOtpRequest
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Mint and deliver a 6-digit email OTP for an OTP-gated action.
      description: |-
        Generates a code with a 5-minute TTL. Delivered out-of-band.
        **Prerequisites:** Authenticated session.
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/OtpRequestInput
      responses:
        "200":
          description: |-
            Code generated.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/OtpRequestOutput
        4XX:
          description: |-
            Action not gated or invalid input.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/ApiErrorEnvelope
  /identity/otp/verify:
    post:
      operationId: |-
        postIdentityOtpVerify
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Verify a delivered OTP and mint an action-bound `otpToken`.
      description: |-
        Returns a single-use token to match with `x-otp-token`.
        **Prerequisites:** `postIdentityOtpRequest`.
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/OtpVerifyInput
      responses:
        "200":
          description: |-
            OTP token minted.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/OtpVerifyOutput
        4XX:
          description: |-
            Invalid or expired code.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/ApiErrorEnvelope
  /identity/login/recovery:
    post:
      operationId: |-
        postIdentityLoginRecovery
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Bootstrap an additional passkey on a new device using a one-shot recovery code.
      description: |-
        For users resetting verification credentials via admin loops.
        **Prerequisites:** `postSecurityHandshake`, admin-issued code.
      x-call-order: 2
      x-depends-on:
        - |-
          postSecurityHandshake
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/LoginRecoveryInput
      responses:
        "200":
          description: |-
            Code verified.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/LoginRecoveryOutput
        4XX:
          description: |-
            Invalid code or bad baseline credentials.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/ApiErrorEnvelope
  /identity/credentials/enroll-options:
    post:
      operationId: |-
        postIdentityCredentialsEnrollOptions
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Mint an enroll-additional state for the current authenticated user.
      description: |-
        Settings-side profile orchestration logic step.
        **Prerequisites:** Logged in context, step-up requirements satisfied.
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
        - $ref: |-
            #/components/parameters/OtpTokenHeader
        - in: |-
            header
          name: |-
            x-action-token
          required: true
          schema:
            type: |-
              string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: |-
                object
              additionalProperties: true
      responses:
        "200":
          description: |-
            Nonce returned.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/EnrollOptionsOutput
  /webauthn/registration/options:
    post:
      operationId: |-
        postWebauthnRegistrationOptions
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        First-time passkey enrollment — fetch creation options.
      description: |-
        Fetches parameter structures for `navigator.credentials.create`.
        **Prerequisites:** `postIdentityLoginPassword` context.
      x-call-order: 3
      x-depends-on:
        - |-
          postIdentityLoginPassword
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/PasskeyOptionsInput
      responses:
        "200":
          description: |-
            WebAuthn creation options.
          content:
            application/json:
              schema:
                type: |-
                  object
                additionalProperties: true
  /webauthn/registration/verify:
    post:
      operationId: |-
        postWebauthnRegistrationVerify
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        First-time passkey enrollment — verify the attestation.
      description: |-
        Persists credentials, sets state parameters flag.
        **Prerequisites:** `postWebauthnRegistrationOptions`.
      x-call-order: 4
      x-depends-on:
        - |-
          postWebauthnRegistrationOptions
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/PasskeyVerifyInput
      responses:
        "200":
          description: |-
            Credential registered.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/PasskeyVerifyResult
  /identity/login/passkey/options:
    post:
      operationId: |-
        postIdentityLoginPasskeyOptions
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Returning user — fetch passkey assertion options.
      description: |-
        Feeds data into `navigator.credentials.get`.
        **Prerequisites:** `postIdentityLoginPassword` returning variant.
      x-call-order: 5
      x-depends-on:
        - |-
          postIdentityLoginPassword
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/PasskeyOptionsInput
      responses:
        "200":
          description: |-
            WebAuthn assertion options.
          content:
            application/json:
              schema:
                type: |-
                  object
                additionalProperties: true
  /identity/login/passkey/verify:
    post:
      operationId: |-
        postIdentityLoginPasskeyVerify
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Returning user — verify the passkey assertion.
      description: |-
        Verifies tracking counters and updates records.
        **Prerequisites:** `postIdentityLoginPasskeyOptions`.
      x-call-order: 6
      x-depends-on:
        - |-
          postIdentityLoginPasskeyOptions
      parameters:
        - $ref: |-
            #/components/parameters/SessionIdHeader
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: |-
                #/components/schemas/PasskeyVerifyInput
      responses:
        "200":
          description: |-
            Session validated.
          content:
            application/json:
              schema:
                $ref: |-
                  #/components/schemas/PasskeyVerifyResult
  /identity/me:
    get:
      operationId: |-
        getIdentityMe
      tags:
        - |-
          02-Identity-Auth
      summary: |-
        Hydration probe — return the bound user for this session.
      description: |-
        Spa session survival hydration endpoint strategy tracker.
        **Prerequisites:** Successful registration or verification sequence completion.
      x-call-order: 7
      x-depends-on:
        - |-
          postIdentityLoginPasskeyVerify
        - |-
          postWebauthnRegistrationVerify
      parameters:
